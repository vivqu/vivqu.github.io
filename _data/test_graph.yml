# Test graph data for /reading-test/?testmode=1
# Synthetic nodes covering topological edge cases.
# See .claude/projects/article-graph/TEST_PLAN.md for the full design.
#
# Node categories (matched by tag membership at runtime):
#   Purple (default) — subcluster-only: tags contain only subcluster tags
#   Red              — supercluster-only: tags contain only supercluster tag(s), no subcluster
#   Orange           — dual-subcluster: two subclusters from the same supercluster
#   Cyan             — free: no tags, or only singleton tags (no circle drawn)
#   Gold             — own post (author: me / domain: self)
#
# Tag taxonomy:
#   tech       (supercluster A)  ← contains frontend + backend
#     frontend (subcluster A1)
#     backend  (subcluster A2)
#   science    (supercluster B)  ← contains biology + physics
#     biology  (subcluster B1)
#     physics  (subcluster B2)
#   society    (supercluster C)  ← contains politics only
#     politics (subcluster C1)
#   misc       (no circle — only 2 nodes)

# ─── HIGH-BACKLINK HUB (category 1 — frontend, referenced by 8 other nodes) ──
