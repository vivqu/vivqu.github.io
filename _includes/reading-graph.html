{% assign graph_url = include.data_url | default: '/reading/graph.json' %}
<div id="graph-container" style="width: 100%; max-width: 920px; margin: 0 auto; height: calc(100vh - 180px); position: relative;">
  <div style="position: absolute; top: 12px; right: 12px; z-index: 10; display: flex; flex-direction: column; gap: 4px;">
    <button id="zoom-in"  style="width:44px;height:44px;background:#1e1e2e;border:1px solid #3a3a5c;color:#ccc;font-size:22px;cursor:pointer;border-radius:4px;line-height:1;padding:0">+</button>
    <button id="zoom-out" style="width:44px;height:44px;background:#1e1e2e;border:1px solid #3a3a5c;color:#ccc;font-size:22px;cursor:pointer;border-radius:4px;line-height:1;padding:0">−</button>
  </div>
  {% if include.test_mode %}
  <div id="test-legend" style="display:none;position:absolute;bottom:16px;left:16px;z-index:10;background:#1e1e2e;border:1px solid #3a3a5c;border-radius:6px;padding:10px 14px;font-size:12px;color:#ccc;line-height:2;">
    <div style="font-size:11px;color:#666;margin-bottom:4px;letter-spacing:0.05em;">TEST MODE — node colors</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#7c6edb;margin-right:8px;vertical-align:middle;"></span>subcluster</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#e05555;margin-right:8px;vertical-align:middle;"></span>supercluster-only</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#e08020;margin-right:8px;vertical-align:middle;"></span>dual-subcluster</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#40c0e0;margin-right:8px;vertical-align:middle;"></span>free</div>
    <div><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#f0c060;margin-right:8px;vertical-align:middle;"></span>own post</div>
  </div>
  {% endif %}
</div>

<div id="graph-tooltip" style="
  position: fixed;
  pointer-events: none;
  display: none;
  background: #1e1e2e;
  border: 1px solid #3a3a5c;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  color: #ddd;
  max-width: 240px;
  z-index: 100;
  line-height: 1.6;
"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
(function () {
  {% if include.test_mode %}
  const TEST_MODE   = new URLSearchParams(location.search).get('testmode') === '1';
  if (TEST_MODE) { const el = document.getElementById('test-legend'); if (el) el.style.display = 'block'; }
  const TEST_COLORS = {
    'subcluster':        '#7c6edb',
    'supercluster-only': '#e05555',
    'dual-subcluster':   '#e08020',
    'free':              '#40c0e0',
  };
  // Stroke overlay for own posts in non-subcluster positions
  const TEST_OWN_STROKE = {
    'supercluster-only': '#e05555',
    'free':              '#40c0e0',
  };
  // SUPER_TAGS computed dynamically inside render() after tagGroups is built
  {% endif %}

  const BG          = '#14141f';
  const ARTICLE_COL = '#7c6edb';
  const OWN_COL     = '#f0c060';
  const TAG_PALETTE = [
    '#d87878', // 0°   red
    '#d89a6a', // 22°  orange-red
    '#d8b86a', // 45°  orange
    '#d0d06a', // 67°  yellow
    '#a8d86a', // 90°  yellow-green
    '#78d87a', // 112° green
    '#6ad8a0', // 135° mint
    '#6ad8c8', // 157° teal
    '#6ac8d8', // 180° cyan
    '#6aa8d8', // 202° sky-blue
    '#6a80d8', // 225° blue
    '#7a6ad8', // 247° blue-purple
    '#a06ad8', // 270° purple
    '#c06ad8', // 292° violet
    '#d86ac0', // 315° magenta
    '#d86a90', // 337° rose
  ];
  const CLUSTER_PAD        = 20;
  const LABEL_ZOOM_THRESHOLD = 1.3; // labels appear above this zoom level

  // Backlink-based radius scale: [0 refs, 1, 2–3, 4–6, 7+] → radius px
  const rScale = d3.scaleThreshold([1, 2, 4, 7], [6, 8, 11, 15, 20]);

  // Age-based color scale: saturation + lightness both vary for max perceptual distinction.
  // Low-saturation grays look identical unless lightness also shifts.
  const AGE_THRESHOLDS = [1, 3, 6, 12, 24];
  const SAT_FACTORS    = [1.0,  0.80, 0.58, 0.36, 0.12, 0.04];
  const LIT_FACTORS    = [0.56, 0.62, 0.64, 0.64, 0.53, 0.44];
  const ageSatScale    = d3.scaleThreshold(AGE_THRESHOLDS, SAT_FACTORS);
  const ageLitScale    = d3.scaleThreshold(AGE_THRESHOLDS, LIT_FACTORS);

  function nodeColor(d) {
    if (d.self) return OWN_COL;
    if (!d.date) return ARTICLE_COL;
    const ageMonths = (Date.now() - new Date(d.date).getTime()) / (1000 * 60 * 60 * 24 * 30.44);
    const c = d3.hsl(ARTICLE_COL);
    c.s = ageSatScale(ageMonths);
    c.l = ageLitScale(ageMonths);
    return c.formatHex();
  }

  const container = document.getElementById('graph-container');
  const tooltip   = document.getElementById('graph-tooltip');

  // Set container height based on actual distance from viewport top so the graph
  // fills the remaining viewport on both desktop and mobile (where the sidebar
  // stacks above the content and the calc(100vh - 180px) hardcode falls short).
  function updateContainerHeight() {
    const top = container.getBoundingClientRect().top;
    container.style.height = Math.max(300, window.innerHeight - top - 20) + 'px';
  }
  updateContainerHeight();

  const svg = d3.select(container).append('svg')
    .attr('width', '100%').attr('height', '100%')
    .style('background', BG).style('display', 'block');

  // Mutable dimensions — updated by readDimensions() on load and on resize.
  // W/H are the real container pixels; VW/VH are the virtual simulation canvas,
  // clamped to a minimum so forces have enough room even on small screens.
  const MIN_VW = 950, MIN_VH = 700;
  let W, H, VW, VH, INIT_ZOOM;
  let currentZoomK      = 0;    // current zoom scale; must be declared before zoom setup
  let activeMemberIds   = null; // Set of node IDs in focused cluster; null when no focus
  let runLabelOcclusion = null; // assigned by render(); invoked by zoom handler
  let focusScale        = null; // zoom scale used when a cluster was focused
  function readDimensions() {
    const rect = svg.node().getBoundingClientRect();
    W = rect.width; H = rect.height;
    VW = Math.max(W, MIN_VW); VH = Math.max(H, MIN_VH);
    // Scale initial view so the virtual canvas fits inside the real viewport.
    INIT_ZOOM = Math.min(0.8, Math.min(W / VW, H / VH) * 0.95);
  }
  readDimensions();

  const g = svg.append('g');

  const zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .translateExtent([[-VW, -VH], [2 * VW, 2 * VH]])
    .on('zoom', e => {
      g.attr('transform', e.transform);
      currentZoomK = e.transform.k;
      if (runLabelOcclusion) runLabelOcclusion();
    });
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(INIT_ZOOM).translate(-VW / 2, -VH / 2));

  // Stored so the ResizeObserver can re-render without re-fetching.
  let graphData       = null;
  let currentSim      = null;
  let legendEl        = null;
  let clusterLegendEl = null;
  let activeTag       = null; // currently focused supercluster or orphan cluster tag

  document.getElementById('zoom-in').addEventListener('click', () =>
    svg.transition().duration(300).call(zoom.scaleBy, 1.4));
  document.getElementById('zoom-out').addEventListener('click', () =>
    svg.transition().duration(300).call(zoom.scaleBy, 0.7));

  fetch('{{ graph_url }}')
    .then(r => r.json())
    .then(data => { graphData = data; render(data); })
    .catch(() => {
      container.innerHTML = '<p style="color:#666;padding:24px">Could not load graph data.</p>';
    });

  function render(data) {
    const nodes = data.nodes.filter(n => n.type === 'article').map(d => ({ ...d }));
    const nodeById = new Map(nodes.map(n => [n.id, n]));
    const refLinks = data.links
      .filter(l => l.type === 'ref' && nodeById.has(l.source) && nodeById.has(l.target))
      .map(d => ({ ...d }));

    // Backlink counts (source/target still strings before D3 resolves them)
    const backlinkCount = new Map();
    refLinks.forEach(l => {
      backlinkCount.set(l.target, (backlinkCount.get(l.target) || 0) + 1);
    });
    function nodeRadius(d) { return rScale(backlinkCount.get(d.id) || 0); }

    {% if include.test_mode %}
    // Precompute cross-cluster flag on each link (source/target are still IDs here)
    refLinks.forEach(l => {
      const src = nodeById.get(l.source);
      const tgt = nodeById.get(l.target);
      const sp = src ? (src.tags || [])[0] : null;
      const tp = tgt ? (tgt.tags || [])[0] : null;
      l.crossCluster = !sp || !tp || sp !== tp;
    });
    // Per-node outgoing cross-cluster ref count (for tooltip)
    const crossClusterRefCount = new Map();
    refLinks.forEach(l => {
      if (l.crossCluster) crossClusterRefCount.set(l.source, (crossClusterRefCount.get(l.source) || 0) + 1);
    });
    {% endif %}

    // Tag color map
    const tagSet = new Set();
    nodes.forEach(n => (n.tags || []).forEach(t => tagSet.add(t)));
    const tags = Array.from(tagSet);
    const tagColor = {};
    tags.forEach((t, i) => { tagColor[t] = TAG_PALETTE[i % TAG_PALETTE.length]; });

    // Group nodes by tag
    const tagGroups = {};
    nodes.forEach(n => {
      (n.tags || []).forEach(t => {
        (tagGroups[t] || (tagGroups[t] = [])).push(n);
      });
    });

    // A tag is a supercluster if its node set is a superset of another tag's node set.
    // Used to give subcluster tags a stronger centroid pull than supercluster tags,
    // so nodes with both [parent, subcluster] tags settle inside the subcluster circle.
    const superTagSet = (() => {
      const s = new Set();
      const nodeIdSets = {};
      tags.forEach(t => { nodeIdSets[t] = new Set((tagGroups[t] || []).map(n => n.id)); });
      tags.forEach(tA => {
        if ((tagGroups[tA] || []).length < 2) return;
        tags.forEach(tB => {
          if (tA === tB || (tagGroups[tB] || []).length < 2) return;
          if ([...nodeIdSets[tB]].every(id => nodeIdSets[tA].has(id))) s.add(tA);
        });
      });
      return s;
    })();
    {% if include.test_mode %}
    const SUPER_TAGS = superTagSet;
    {% endif %}

    // A tag is a true subcluster if it's not a supercluster but all its nodes belong to some supercluster.
    const subTagSet = new Set(
      tags.filter(t => {
        if (superTagSet.has(t)) return false;
        if ((tagGroups[t] || []).length < 2) return false;
        return [...superTagSet].some(st => {
          const superIds = new Set((tagGroups[st] || []).map(n => n.id));
          return (tagGroups[t] || []).every(n => superIds.has(n.id));
        });
      })
    );

    // Precompute link type for per-link force strength.
    //   'sub-cross' — both ends in subclusters but different ones (minimal force)
    //   'sub-free'  — one end is subcluster, other is free (stronger attraction)
    //   'default'   — everything else
    refLinks.forEach(l => {
      const src = nodeById.get(typeof l.source === 'object' ? l.source.id : l.source);
      const tgt = nodeById.get(typeof l.target === 'object' ? l.target.id : l.target);
      const srcSubTags = (src?.tags || []).filter(t => subTagSet.has(t));
      const tgtSubTags = (tgt?.tags || []).filter(t => subTagSet.has(t));
      const srcIsFree  = !(src?.tags || []).some(t => superTagSet.has(t) || subTagSet.has(t));
      const tgtIsFree  = !(tgt?.tags || []).some(t => superTagSet.has(t) || subTagSet.has(t));
      if (srcSubTags.length > 0 && tgtSubTags.length > 0 &&
          !srcSubTags.some(t => tgtSubTags.includes(t))) {
        l.linkType = 'sub-cross';
      } else if ((srcSubTags.length > 0 && tgtIsFree) || (tgtSubTags.length > 0 && srcIsFree)) {
        l.linkType = 'sub-free';
      } else {
        l.linkType = 'default';
      }
    });

    // Seed nodes by supercluster in the virtual canvas (VW×VH).
    // Each supercluster gets a distinct region so simulation starts separated.
    const superTagList = [...superTagSet];
    const superSeedPos = {};
    superTagList.forEach((st, i) => {
      const angle = (i / superTagList.length) * 2 * Math.PI - Math.PI / 2;
      superSeedPos[st] = {
        x: VW / 2 + Math.cos(angle) * VW * 0.22,
        y: VH / 2 + Math.sin(angle) * VH * 0.22,
      };
    });

    // Per-subcluster seed angle within each supercluster — break initial symmetry so
    // the subcluster separation force has a non-zero direction vector from tick 1.
    const subSeedAngle = {};
    superTagList.forEach(st => {
      const superNodeIds = new Set((tagGroups[st] || []).map(n => n.id));
      const subTagsForSuper = Object.keys(tagGroups).filter(t =>
        !superTagSet.has(t) &&
        (tagGroups[t] || []).length >= 2 &&
        (tagGroups[t] || []).every(n => superNodeIds.has(n.id))
      );
      subTagsForSuper.forEach((subTag, i) => {
        subSeedAngle[subTag] = (i / Math.max(subTagsForSuper.length, 1)) * 2 * Math.PI;
      });
    });

    // Orphan cluster tags: have >= 2 nodes, are not a supercluster, and are not a
    // subcluster of any supercluster. Seed them around the outer edge so they don't
    // start in the center where the superclusters are.
    const orphanClusterTags = Object.keys(tagGroups).filter(t =>
      !superTagSet.has(t) &&
      (tagGroups[t] || []).length >= 2 &&
      !(t in subSeedAngle)
    );
    const orphanSeedPos = {};
    orphanClusterTags.forEach((t, i) => {
      const angle = (i / Math.max(orphanClusterTags.length, 1)) * 2 * Math.PI;
      orphanSeedPos[t] = {
        x: VW / 2 + Math.cos(angle) * VW * 0.42,
        y: VH / 2 + Math.sin(angle) * VH * 0.42,
      };
    });

    nodes.forEach(n => {
      const superTag = (n.tags || []).find(t => superTagSet.has(t));
      const orphanTag = !superTag ? (n.tags || []).find(t => orphanSeedPos[t]) : undefined;
      const freeAngle = Math.random() * 2 * Math.PI;
      const seed = superTag ? superSeedPos[superTag]
                 : orphanTag ? orphanSeedPos[orphanTag]
                 : { x: VW / 2 + Math.cos(freeAngle) * VW * 0.42,
                     y: VH / 2 + Math.sin(freeAngle) * VH * 0.42 };
      const subTag = (n.tags || []).find(t => subSeedAngle[t] !== undefined);
      const angle = subTag !== undefined ? subSeedAngle[subTag] : Math.random() * 2 * Math.PI;
      const spreadR = subTag !== undefined ? 60 : 40;
      n.x = seed.x + Math.cos(angle) * spreadR + (Math.random() - 0.5) * 30;
      n.y = seed.y + Math.sin(angle) * spreadR + (Math.random() - 0.5) * 30;
    });

    const clusterCircle = {};

    function clusterForce(alpha) {
      const centroids = {};
      Object.entries(tagGroups).forEach(([t, ns]) => {
        if (ns.length < 2) return;
        // For subclusters: use only "pure" members (not in any sibling subcluster)
        // so the centroid stays in the non-overlapping region of the subcluster.
        // Dual-subcluster nodes (e.g. fullstack) are pulled by both centroids equally
        // and settle naturally at the intersection.
        let centroidNodes = ns;
        if (!superTagSet.has(t)) {
          const pureMembers = ns.filter(n =>
            !(n.tags || []).some(sib => sib !== t && !superTagSet.has(sib) && (tagGroups[sib] || []).length >= 2)
          );
          if (pureMembers.length > 0) centroidNodes = pureMembers;
        }
        centroids[t] = { cx: d3.mean(centroidNodes, d => d.x), cy: d3.mean(centroidNodes, d => d.y) };
      });

      nodes.forEach(n => {
        const nodeTags = new Set(n.tags || []);
        // Free nodes (belong to no cluster) are handled exclusively by freeNodeForce
        const isFreeNode = !(n.tags || []).some(t => clusterCircle[t]);

        Object.entries(centroids).forEach(([t, { cx, cy }]) => {
          const dx = n.x - cx;
          const dy = n.y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;

          if (nodeTags.has(t)) {
            // Subcluster tags get a stronger pull than supercluster tags so nodes
            // settle inside the subcluster circle, not the outer supercluster ring.
            const strength = superTagSet.has(t) ? 0.06 : 0.15;
            n.vx -= dx * alpha * strength;
            n.vy -= dy * alpha * strength;
          } else if (!isFreeNode) {
            const circle = clusterCircle[t];
            if (!circle) return;
            const pushRadius = circle.r + 56;
            if (dist < pushRadius) {
              const force = ((pushRadius - dist) / pushRadius) * alpha * 0.8;
              n.vx += (dx / dist) * force;
              n.vy += (dy / dist) * force;
            }
          }
        });
      });
    }

    function clusterBoundaryForce(alpha) {
      const pad = 24;
      Object.entries(clusterCircle).forEach(([tag, { cx, cy, r }]) => {
        const ns = tagGroups[tag];
        if (!ns || ns.length < 2) return;
        const leftExcess   = pad - (cx - r);
        const rightExcess  = (cx + r) - (VW - pad);
        const topExcess    = pad - (cy - r);
        const bottomExcess = (cy + r) - (VH - pad);
        const s = alpha * 0.9;
        ns.forEach(n => {
          if (leftExcess   > 0) n.vx += leftExcess   * s;
          if (rightExcess  > 0) n.vx -= rightExcess  * s;
          if (topExcess    > 0) n.vy += topExcess    * s;
          if (bottomExcess > 0) n.vy -= bottomExcess * s;
        });
      });
    }

    // Fix 4: push sibling subcluster circles apart (those sharing a supercluster parent).
    // Subclusters that share nodes are a Venn diagram — overlap is intentional, skip them.
    // Subclusters with no shared nodes must not overlap at all.
    function subclusterSeparationForce(alpha) {
      const subTags = Object.keys(clusterCircle).filter(t => !superTagSet.has(t));
      const superNodeSets = {};
      superTagSet.forEach(st => {
        superNodeSets[st] = new Set((tagGroups[st] || []).map(n => n.id));
      });
      for (let i = 0; i < subTags.length; i++) {
        for (let j = i + 1; j < subTags.length; j++) {
          const tA = subTags[i], tB = subTags[j];
          const nodesA = tagGroups[tA] || [];
          const nodesB = tagGroups[tB] || [];
          const idsA = new Set(nodesA.map(n => n.id));
          // Skip if they share any nodes — Venn overlap is intentional
          if (nodesB.some(n => idsA.has(n.id))) continue;
          // Only separate sibling subclusters (same supercluster parent)
          const nodeIdsA = nodesA.map(n => n.id);
          const nodeIdsB = nodesB.map(n => n.id);
          const sharedSuper = [...superTagSet].some(st => {
            const s = superNodeSets[st];
            return nodeIdsA.every(id => s.has(id)) && nodeIdsB.every(id => s.has(id));
          });
          if (!sharedSuper) continue;
          const cA = clusterCircle[tA], cB = clusterCircle[tB];
          const dx = cB.cx - cA.cx, dy = cB.cy - cA.cy;
          const dist = Math.hypot(dx, dy) || 1;
          const overlap = (cA.r + cB.r + 20) - dist;
          if (overlap > 0) {
            const nx = dx / dist, ny = dy / dist;
            const push = overlap * 0.5 * alpha;
            nodesA.forEach(n => { n.vx -= nx * push; n.vy -= ny * push; });
            nodesB.forEach(n => { n.vx += nx * push; n.vy += ny * push; });
          }
        }
      }
    }

    // Fix 5: attract superclusters toward each other, with a repulsion floor so they don't overlap.
    // Also repel orphan clusters (e.g. "misc") from all other cluster circles.
    function superclusterProximityForce(alpha) {
      const superTags  = Object.keys(clusterCircle).filter(t => superTagSet.has(t));
      const orphanTags = Object.keys(clusterCircle).filter(t => !superTagSet.has(t) &&
        !superTags.some(st => (tagGroups[t] || []).every(n =>
          (tagGroups[st] || []).some(sn => sn.id === n.id))));

      // Supercluster ↔ supercluster: attract + repel
      for (let i = 0; i < superTags.length; i++) {
        for (let j = i + 1; j < superTags.length; j++) {
          const tA = superTags[i], tB = superTags[j];
          const cA = clusterCircle[tA], cB = clusterCircle[tB];
          const dx = cB.cx - cA.cx, dy = cB.cy - cA.cy;
          const dist = Math.hypot(dx, dy) || 1;
          const minDist = cA.r + cB.r + 50;
          const nx = dx / dist, ny = dy / dist;
          if (dist > minDist) {
            const pull = (dist - minDist) * 0.008 * alpha;
            (tagGroups[tA] || []).forEach(n => { n.vx += nx * pull; n.vy += ny * pull; });
            (tagGroups[tB] || []).forEach(n => { n.vx -= nx * pull; n.vy -= ny * pull; });
          } else {
            const overlap = minDist - dist;
            const push = overlap * alpha * 1.2;
            (tagGroups[tA] || []).forEach(n => { n.vx -= nx * push; n.vy -= ny * push; });
            (tagGroups[tB] || []).forEach(n => { n.vx += nx * push; n.vy += ny * push; });
          }
        }
      }

      // Orphan cluster ↔ all other circles: repel only
      orphanTags.forEach(tO => {
        const cO = clusterCircle[tO];
        Object.keys(clusterCircle).forEach(tOther => {
          if (tOther === tO) return;
          const cOther = clusterCircle[tOther];
          const dx = cO.cx - cOther.cx, dy = cO.cy - cOther.cy;
          const dist = Math.hypot(dx, dy) || 1;
          const minDist = cO.r + cOther.r + 30;
          if (dist < minDist) {
            const overlap = minDist - dist;
            const push = (overlap / minDist) * alpha * 12.0;
            const nx = dx / dist, ny = dy / dist;
            (tagGroups[tO] || []).forEach(n => { n.vx += nx * push; n.vy += ny * push; });
          }
        });
      });
    }

    // Fix 6: pull supercluster-only nodes to the outer ring, clearing all subcluster circles
    function ringOrbitalForce(alpha) {
      nodes.forEach(n => {
        const tags = n.tags || [];
        const hasSuperTag = tags.some(t => superTagSet.has(t) && clusterCircle[t]);
        const hasSubCircle = tags.some(t => !superTagSet.has(t) && clusterCircle[t]);
        if (!hasSuperTag || hasSubCircle) return;
        const superTag = tags.find(t => superTagSet.has(t) && clusterCircle[t]);
        const { cx, cy, r } = clusterCircle[superTag];
        const dx = n.x - cx, dy = n.y - cy;
        const currentR = Math.hypot(dx, dy) || 1;

        // Compute the minimum radius that clears all subclusters within this supercluster
        const superNodeSet = new Set((tagGroups[superTag] || []).map(nd => nd.id));
        let minClearR = 0;
        Object.entries(clusterCircle).forEach(([subTag, sc]) => {
          if (superTagSet.has(subTag)) return;
          const subNodes = tagGroups[subTag] || [];
          if (!subNodes.every(nd => superNodeSet.has(nd.id))) return;
          const scDist = Math.hypot(sc.cx - cx, sc.cy - cy);
          minClearR = Math.max(minClearR, scDist + sc.r + 50);
        });
        const targetR = Math.max(minClearR, 0.82 * r);

        const pull = (currentR - targetR) * 0.10 * alpha;
        n.vx -= (dx / currentR) * pull;
        n.vy -= (dy / currentR) * pull;
      });
    }

    // Generalized subcluster exclusion: push nodes out of sibling subcluster circles.
    // Replaces singleSubclusterBoundaryForce which only handled nodes with exactly 1 subcluster tag,
    // skipping supercluster-only nodes (0 sub-tags) and dual-subcluster nodes (2 sub-tags).
    // Rule: a node must stay outside every subcluster circle within its supercluster that it doesn't belong to.
    function nodeExclusionForce(alpha) {
      if (Object.keys(clusterCircle).length === 0) return;

      // Build supercluster → child subTags map (tags with circles inside each supercluster)
      const superToSubTags = {};
      superTagSet.forEach(st => {
        const superNodeIds = new Set((tagGroups[st] || []).map(n => n.id));
        superToSubTags[st] = Object.keys(clusterCircle).filter(t =>
          !superTagSet.has(t) &&
          (tagGroups[t] || []).every(n => superNodeIds.has(n.id))
        );
      });

      nodes.forEach(n => {
        const nodeTags = new Set(n.tags || []);
        const superTag = (n.tags || []).find(t => superTagSet.has(t));
        if (!superTag) return; // free nodes handled by freeNodeForce

        // Push out of every sibling subcluster circle this node doesn't belong to
        const siblings = (superToSubTags[superTag] || []).filter(t => !nodeTags.has(t));
        siblings.forEach(sibTag => {
          const sib = clusterCircle[sibTag];
          if (!sib) return;
          const dx = n.x - sib.cx, dy = n.y - sib.cy;
          const dist = Math.hypot(dx, dy) || 1;
          const boundary = sib.r + nodeRadius(n) + 12;
          if (dist < boundary) {
            const penetration = boundary - dist;
            const force = penetration * 3.0 * alpha;
            n.vx += (dx / dist) * force;
            n.vy += (dy / dist) * force;
          }
        });
      });
    }

    // Fix 7: keep free nodes (no cluster tag) outside every cluster circle.
    // Two-pass per node: (1) repel out of any circle the node is inside,
    // (2) attract toward the nearest circle's edge so they park close by.
    function freeNodeForce(alpha) {
      if (Object.keys(clusterCircle).length === 0) return;
      const margin = 40;
      nodes.forEach(n => {
        const isFree = !(n.tags || []).some(t => clusterCircle[t]);
        if (!isFree) return;

        let nearestCircle = null, nearestEdgeDist = Infinity;

        Object.values(clusterCircle).forEach(c => {
          const dx = n.x - c.cx, dy = n.y - c.cy;
          const dist = Math.hypot(dx, dy) || 1;
          const edgeDist = dist - c.r; // negative = inside circle

          // Track nearest circle edge for parking attraction
          if (Math.abs(edgeDist - margin) < Math.abs(nearestEdgeDist - margin)) {
            nearestEdgeDist = edgeDist;
            nearestCircle = { ...c, dx, dy, dist };
          }

          // Repel from every circle the node is inside (with margin)
          if (dist < c.r + margin) {
            const overlap = (c.r + margin) - dist;
            const strength = overlap * 0.12 * alpha;
            n.vx += (dx / dist) * strength;
            n.vy += (dy / dist) * strength;
          }
        });

        // Gentle attraction toward parking spot just outside nearest circle
        if (nearestCircle && nearestEdgeDist > margin + 20) {
          const pull = (nearestEdgeDist - margin) * 0.04 * alpha;
          n.vx -= (nearestCircle.dx / nearestCircle.dist) * pull;
          n.vy -= (nearestCircle.dy / nearestCircle.dist) * pull;
        }
      });
    }

    // ── Legend cluster focus helpers ──────────────────────────────────────

    // Returns the set of circle tags that should be highlighted when `tag` is focused.
    // For superclusters: includes the supercluster + all of its child subcluster tags.
    // For orphan clusters: just that tag.
    function getHighlightTagsForFocus(tag) {
      const s = new Set([tag]);
      if (superTagSet.has(tag)) {
        const superNodeIds = new Set((tagGroups[tag] || []).map(n => n.id));
        Object.keys(clusterCircle).forEach(t => {
          if (!superTagSet.has(t) && (tagGroups[t] || []).every(n => superNodeIds.has(n.id))) s.add(t);
        });
      }
      return s;
    }

    function focusTag(tag) {
      if (activeTag === tag) { resetFocus(); return; }
      activeTag = tag;

      // Member node IDs for this cluster (supercluster tagGroups already includes subcluster nodes)
      const memberIds = new Set((tagGroups[tag] || []).map(n => n.id));
      activeMemberIds = memberIds; // expose to zoom handler so labels show regardless of zoom level

      // Interrupt any in-flight transitions before starting new ones
      nodeG.interrupt();
      refLines.interrupt();
      svg.interrupt();

      nodeG.transition().duration(400)
        .style('opacity', d => memberIds.has(d.id) ? 1 : 0.12);
      refLines.transition().duration(400)
        .style('opacity', l => {
          const srcId = typeof l.source === 'object' ? l.source.id : l.source;
          const tgtId = typeof l.target === 'object' ? l.target.id : l.target;
          return memberIds.has(srcId) && memberIds.has(tgtId) ? 1 : 0.04;
        });

      // Zoom so the cluster fills ~70% of the viewport
      const circle = clusterCircle[tag];
      if (circle) {
        const scale = Math.max(0.3, Math.min(2, Math.min(W, H) * 0.7 / (2 * circle.r)));
        focusScale = scale;
        svg.transition().duration(600).call(zoom.transform,
          d3.zoomIdentity.translate(W / 2 - circle.cx * scale, H / 2 - circle.cy * scale).scale(scale));
      }

      // Force cluster circles to update immediately (sim may have already cooled)
      updateClusters();
      updateLegendActiveState();
    }

    function resetFocus() {
      activeTag = null;
      activeMemberIds = null;
      focusScale = null;

      // Interrupt any in-flight transitions before starting new ones
      nodeG.interrupt();
      refLines.interrupt();
      svg.interrupt();

      nodeG.transition().duration(400).style('opacity', 1);
      refLines.transition().duration(400).style('opacity', 1);
      svg.transition().duration(600).call(zoom.transform,
        d3.zoomIdentity.translate(W / 2, H / 2).scale(INIT_ZOOM).translate(-VW / 2, -VH / 2));

      // Force cluster circles back to default state immediately
      updateClusters();
      updateLegendActiveState();
    }

    function updateLegendActiveState() {
      if (!clusterLegendEl) return;
      d3.select(clusterLegendEl).selectAll('.cl-item')
        .style('background', d => d === activeTag ? tagColor[d] + '2a' : 'transparent')
        .style('font-weight', d => d === activeTag ? 'bold' : 'normal')
        .style('text-decoration', d => d === activeTag ? 'underline' : 'none');
    }

    const sim = d3.forceSimulation(nodes)
      .force('link',           d3.forceLink(refLinks).id(d => d.id).distance(40).strength(l => {
                           if (l.linkType === 'sub-cross') return 0.01;
                           if (l.linkType === 'sub-free')  return 0.10;
                           return 0.08;
                         }))
      .force('charge',         d3.forceManyBody().strength(-35))
      .force('collide',        d3.forceCollide(d => nodeRadius(d) + 8))
      .force('x',              d3.forceX(d => {
                                 const st = (d.tags || []).find(t => superTagSet.has(t));
                                 return superSeedPos[st] ? superSeedPos[st].x : VW / 2;
                               }).strength(d => (d.tags || []).some(t => superTagSet.has(t)) ? 0.025 : 0))
      .force('y',              d3.forceY(d => {
                                 const st = (d.tags || []).find(t => superTagSet.has(t));
                                 return superSeedPos[st] ? superSeedPos[st].y : VH / 2;
                               }).strength(d => (d.tags || []).some(t => superTagSet.has(t)) ? 0.025 : 0))
      .force('cluster',        () => sim && clusterForce(sim.alpha()))
      .force('clusterBound',   () => sim && clusterBoundaryForce(sim.alpha()))
      .force('subSeparation',  () => sim && subclusterSeparationForce(sim.alpha()))
      .force('superProximity', () => sim && superclusterProximityForce(sim.alpha()))
      .force('ringOrbital',    () => sim && ringOrbitalForce(sim.alpha()))
      .force('nodeExclusion',  () => sim && nodeExclusionForce(sim.alpha()))
      .force('freeNode',       () => sim && freeNodeForce(sim.alpha()))
      .alphaDecay(0.015)
      .velocityDecay(0.45);

    // Background rect — catches clicks on empty canvas to reset focus
    g.append('rect')
      .attr('width', VW).attr('height', VH)
      .attr('fill', 'transparent')
      .style('cursor', 'default')
      .on('click', () => { if (activeTag) resetFocus(); });

    // Layers (back to front)
    const clusterLayer      = g.append('g');
    const clusterLabelLayer = g.append('g');
    const refLinkLayer      = g.append('g');
    const nodeLayer         = g.append('g');
    const nodeLabelLayer    = g.append('g'); // above nodeLayer so labels are never obscured by circles
    const hoverCircleLayer  = g.append('g').style('pointer-events', 'none'); // topmost: hovered circle duplicate

    const refLines = refLinkLayer.selectAll('line')
      .data(refLinks)
      .join('line')
      .attr('stroke', {% if include.test_mode %}d => TEST_MODE && d.crossCluster ? '#f0e040' : 'rgba(255,255,255,0.5)'{% else %}'rgba(255,255,255,0.5)'{% endif %})
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '5 3');

    const nodeG = nodeLayer.selectAll('g')
      .data(nodes)
      .join('g')
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

    nodeG.append('circle')
      .attr('r', d => nodeRadius(d))
      {% if include.test_mode %}
      .attr('fill', d => {
        if (!TEST_MODE) return nodeColor(d);
        return d.self ? OWN_COL : (TEST_COLORS[d.testCategory] || ARTICLE_COL);
      })
      .attr('stroke', d => TEST_MODE && d.self ? (TEST_OWN_STROKE[d.testCategory] || null) : null)
      .attr('stroke-width', d => TEST_MODE && d.self && TEST_OWN_STROKE[d.testCategory] ? 2 : null);
      {% else %}
      .attr('fill', d => nodeColor(d));
      {% endif %}

    // Labels live in their own top layer so they're never occluded by node circles
    const nodeLabels = nodeLabelLayer.selectAll('text')
      .data(nodes)
      .join('text')
      .attr('class', 'node-label')
      .text(d => {
        if (d.label.length <= 32) return d.label;
        const cut = d.label.lastIndexOf(' ', 32);
        return (cut > 0 ? d.label.slice(0, cut) : d.label.slice(0, 32)) + '…';
      })
      .attr('text-anchor', 'middle')
      .attr('fill', '#ccc')
      .attr('font-size', '9px')
      .style('pointer-events', 'none')
      .style('opacity', 0);

    // Fast lookup: node id → label DOM element
    const labelById = new Map();
    nodeLabels.each(function (d) { labelById.set(d.id, this); });

    // Track which node is currently hovered for tick updates
    let hoveredNode = null;

    nodeG
      .on('mouseenter', function (event, d) {
        hoveredNode = d;
        // Paint a duplicate circle in the topmost layer so it renders above all labels
        hoverCircleLayer.selectAll('circle').remove();
        const srcCircle = this.querySelector('circle');
        hoverCircleLayer.append('circle')
          .attr('r',    d3.select(srcCircle).attr('r'))
          .attr('fill', d3.select(srcCircle).attr('fill'))
          .attr('stroke',       d3.select(srcCircle).attr('stroke'))
          .attr('stroke-width', d3.select(srcCircle).attr('stroke-width'))
          .attr('cx', d.x)
          .attr('cy', d.y);
        const lbl = labelById.get(d.id);
        if (lbl) {
          d3.select(lbl).raise(); // bring label to front within nodeLabelLayer
          d3.select(lbl).style('font-weight', 'bold').style('opacity', 1);
          // Dim any other label that overlaps the hovered label OR the hovered circle
          const hr = lbl.getBoundingClientRect();
          const cr = hoverCircleLayer.select('circle').node()?.getBoundingClientRect();
          nodeLabels.each(function (ld) {
            if (ld.id === d.id || parseFloat(this.style.opacity || 1) <= 0) return;
            const r = this.getBoundingClientRect();
            if (r.width === 0) return;
            const overlapsLabel  = r.left < hr.right && r.right > hr.left && r.top < hr.bottom && r.bottom > hr.top;
            const overlapsCircle = cr && r.left < cr.right && r.right > cr.left && r.top < cr.bottom && r.bottom > cr.top;
            if (overlapsLabel || overlapsCircle) this.style.opacity = '0.38';
          });
        }
        const dateStr = d.date
          ? new Date(d.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
          : '';
        const tagsHtml = (d.tags || []).length
          ? `<br><span style="color:#888">${d.tags.join(', ')}</span>` : '';
        const blurbHtml = d.blurb
          ? `<br><span style="color:#aaa;font-style:italic">${esc(d.blurb)}</span>` : '';
        {% if include.test_mode %}
        let testInfoHtml = '';
        if (TEST_MODE) {
          const primaryCluster = (d.tags || []).find(t => SUPER_TAGS.has(t)) || '—';
          const crossRefs = crossClusterRefCount.get(d.id) || 0;
          testInfoHtml = `<br><span style="color:#555">── test info ──</span>`
            + `<br><span style="color:#999">category: ${esc(d.testCategory || '?')}</span>`
            + `<br><span style="color:#999">primary cluster: ${esc(primaryCluster)}</span>`
            + `<br><span style="color:#999">cross-cluster refs: ${crossRefs}${crossRefs > 0 ? ' ⚠' : ''}</span>`;
        }
        {% endif %}
        const domain = d.self ? null : (() => { try { const parts = new URL(d.id).hostname.split('.'); return parts.slice(-2).join('.'); } catch { return null; } })();
        const domainHtml = domain ? `<br><span style="color:#666">${esc(domain)}</span>` : '';
        tooltip.innerHTML = `<strong>${esc(d.label)}</strong><br>${esc(d.author)}${dateStr ? ' · ' + dateStr : ''}${domainHtml}${tagsHtml}${blurbHtml}{% if include.test_mode %}${testInfoHtml}{% endif %}`;
        tooltip.style.display = 'block';
        positionTooltip(event);
      })
      .on('mousemove', positionTooltip)
      .on('mouseleave', function (event, d) {
        hoveredNode = null;
        hoverCircleLayer.selectAll('circle').remove();
        const lbl = labelById.get(d.id);
        if (lbl) d3.select(lbl).style('font-weight', null);
        if (runLabelOcclusion) runLabelOcclusion();
        tooltip.style.display = 'none';
      })
      .on('click', (event, d) => { event.stopPropagation(); window.open(d.id, '_blank'); });

    function positionTooltip(event) {
      tooltip.style.left = Math.min(event.clientX + 14, window.innerWidth - 260) + 'px';
      tooltip.style.top  = Math.min(Math.max(event.clientY - 32, 8), window.innerHeight - 220) + 'px';
    }

    function updateClusters() {
      const clusterData = Object.entries(tagGroups)
        .filter(([, ns]) => ns.length >= 2 && ns[0].x != null)
        .map(([tag, ns]) => {
          const cx = d3.mean(ns, n => n.x);
          const cy = d3.mean(ns, n => n.y);
          const r  = d3.max(ns, n => Math.sqrt((n.x - cx) ** 2 + (n.y - cy) ** 2) + nodeRadius(n)) + CLUSTER_PAD;
          return { tag, cx, cy, r };
        });

      const outerNodeSets = new Map(
        clusterData.map(d => [d.tag, new Set(tagGroups[d.tag].map(n => n.id))])
      );
      clusterData.forEach(outer => {
        clusterData.forEach(inner => {
          if (inner.tag === outer.tag) return;
          const outerSet = outerNodeSets.get(outer.tag);
          const allInside = tagGroups[inner.tag].every(n => outerSet.has(n.id));
          if (allInside) {
            const dist = Math.sqrt((inner.cx - outer.cx) ** 2 + (inner.cy - outer.cy) ** 2);
            const needed = dist + inner.r + 20;
            if (needed > outer.r) outer.r = needed;
          }
        });
      });

      clusterData.forEach(d => { clusterCircle[d.tag] = { cx: d.cx, cy: d.cy, r: d.r }; });

      const highlightSet = activeTag ? getHighlightTagsForFocus(activeTag) : null;

      clusterLayer.selectAll('circle')
        .data(clusterData, d => d.tag)
        .join('circle')
        .attr('fill',             {% if include.test_mode %}d => TEST_MODE ? 'none' : tagColor[d.tag] + '18'{% else %}d => tagColor[d.tag] + '18'{% endif %})
        .attr('stroke',           {% if include.test_mode %}d => TEST_MODE ? (SUPER_TAGS.has(d.tag) ? '#4a80e0' : '#e04a4a') : (highlightSet ? (highlightSet.has(d.tag) ? tagColor[d.tag] : tagColor[d.tag] + '25') : tagColor[d.tag] + '60'){% else %}d => highlightSet ? (highlightSet.has(d.tag) ? tagColor[d.tag] : tagColor[d.tag] + '25') : tagColor[d.tag] + '60'{% endif %})
        .attr('stroke-width',     {% if include.test_mode %}d => TEST_MODE ? 2 : (highlightSet && highlightSet.has(d.tag) ? 2.5 : 1.5){% else %}d => highlightSet && highlightSet.has(d.tag) ? 2.5 : 1.5{% endif %})
        .attr('stroke-dasharray', {% if include.test_mode %}d => TEST_MODE && SUPER_TAGS.has(d.tag) ? '6 3' : null{% else %}null{% endif %})
        .style('opacity',         d => highlightSet ? (highlightSet.has(d.tag) ? 1 : 0.2) : 1)
        .attr('cx', d => d.cx)
        .attr('cy', d => d.cy)
        .attr('r',  d => d.r);

      clusterLabelLayer.selectAll('text')
        .data(clusterData, d => d.tag)
        .join('text')
        .attr('fill',        d => tagColor[d.tag])
        .attr('font-size',   '11px')
        .attr('text-anchor', 'middle')
        .style('pointer-events', 'none')
        .style('display',    W < 415 ? 'none' : null)
        .style('opacity',    d => highlightSet ? (highlightSet.has(d.tag) ? 1 : 0.15) : 1)
        .text(d => d.tag)
        .attr('x', d => d.cx)
        .attr('y', d => d.cy + d.r - 8);
    }

    // ── Label occlusion ──────────────────────────────────────────────────
    // Greedy algorithm: sort labels by priority (backlink count), show the
    // highest-priority label that doesn't overlap any already-shown label.
    // Runs on every zoom event and when focus state changes.
    function occludeLabels() {
      const showByZoom = currentZoomK >= LABEL_ZOOM_THRESHOLD;
      const hasFocus   = activeMemberIds !== null;

      // Hard floor: hide all labels when zoomed out too far, even when focused.
      // • Small cluster (focusScale > threshold, zoomed in a lot): fall back to the
      //   default LABEL_ZOOM_THRESHOLD — labels hide as soon as zoom drops below it.
      // • Large cluster (focusScale ≤ threshold, zoomed in less): show labels at the
      //   auto-focus zoom, but hide after one zoom-out button click (×0.7).
      //   Floor sits at focusScale×0.85, which is above the first-click landing point
      //   (focusScale×0.7), so the first click always crosses below the floor.
      // • No focus: 0 (candidates gated by LABEL_ZOOM_THRESHOLD in the loop below).
      let labelFloor = 0;
      if (hasFocus && focusScale !== null) {
        labelFloor = focusScale > LABEL_ZOOM_THRESHOLD
          ? LABEL_ZOOM_THRESHOLD          // small cluster: use default threshold
          : focusScale * 0.85;            // large cluster: one-click tolerance
      }
      if (currentZoomK < labelFloor) {
        nodeLabels.each(function () { this.style.opacity = '0'; });
        return;
      }

      // Collect candidates: labels eligible to be shown in current state
      const candidates = [];
      nodeLabels.each(function (d) {
        const isCandidate = hasFocus ? activeMemberIds.has(d.id) : showByZoom;
        if (!isCandidate) { this.style.opacity = '0'; return; }
        candidates.push({ el: this, self: d.self, priority: d.self ? Infinity : (backlinkCount.get(d.id) || 0) });
      });

      if (candidates.length === 0) return;

      // Higher backlink count → shown first → less likely to be occluded
      candidates.sort((a, b) => b.priority - a.priority);

      // Pre-seed occupied with cluster label bounding boxes so node labels
      // that overlap a cluster label are dimmed. Only include cluster labels
      // that are actually visible (opacity > 0.5 — skip faded/focused-away ones).
      const occupied = [];
      clusterLabelLayer.selectAll('text').each(function () {
        if (this.style.display === 'none') return;
        if (parseFloat(this.style.opacity ?? 1) < 0.5) return;
        const r = this.getBoundingClientRect();
        if (r.width > 0) occupied.push(r);
      });

      candidates.forEach(({ el, self }) => {
        const r = el.getBoundingClientRect();
        if (r.width === 0) { el.style.opacity = '0'; return; } // not yet laid out
        if (self) {
          // Own posts are never occluded — always shown, always block others
          el.style.opacity = '1';
          occupied.push(r);
          return;
        }
        const overlaps = occupied.some(o =>
          r.left < o.right && r.right > o.left && r.top < o.bottom && r.bottom > o.top
        );
        el.style.opacity = overlaps ? '0.38' : '1';
        if (!overlaps) occupied.push(r);
      });
    }

    runLabelOcclusion = occludeLabels;

    currentSim = sim;
    sim.on('tick', () => {
      const MAX_V = 25;
      nodes.forEach(n => {
        // Cap velocity to prevent explosion when nodes start far apart (e.g. a
        // high-degree hub linked to nodes on the opposite side of the canvas).
        // Without this, forceLink applies ~(dist - restLen) * strength px/tick on
        // tick 1, which for dist=600 is ~44px — enough to send nodes to the bounds
        // wall where the position clamp kills one axis while velocity continues
        // accumulating in the other, forming the characteristic axis-aligned chains.
        const v = Math.hypot(n.vx || 0, n.vy || 0);
        if (v > MAX_V) { n.vx = (n.vx / v) * MAX_V; n.vy = (n.vy / v) * MAX_V; }

        const r = nodeRadius(n);
        n.x = Math.max(r + 4, Math.min(VW - r - 4, n.x));
        n.y = Math.max(r + 4, Math.min(VH - r - 4, n.y));
      });

      refLines
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
      nodeLabels.attr('x', d => d.x).attr('y', d => d.y + nodeRadius(d) + 12);
      if (hoveredNode) {
        hoverCircleLayer.select('circle').attr('cx', hoveredNode.x).attr('cy', hoveredNode.y);
      }
      updateClusters();
    });

    sim.on('end', () => { occludeLabels(); });

    buildAgeLegend();
    buildClusterLegend();

    function buildClusterLegend() {
      if (clusterLegendEl) { d3.select(clusterLegendEl).remove(); clusterLegendEl = null; }
      if (W < 415) return;

      // Only show superclusters and orphan clusters — subclusters are navigable by zooming in
      const legendTags = [...superTagList, ...orphanClusterTags];
      if (legendTags.length === 0) return;

      const div = d3.select(container).append('div')
        .style('position', 'absolute')
        .style('bottom', '16px')
        .style('right', '16px')
        .style('z-index', '10')
        .style('background', '#1e1e2e')
        .style('border', '1px solid #3a3a5c')
        .style('border-radius', '6px')
        .style('padding', '8px 12px')
        .style('font-size', '11px')
        .style('color', '#ccc')
        .style('user-select', 'none');
      clusterLegendEl = div.node();

      div.append('div')
        .style('font-size', '10px')
        .style('color', '#666')
        .style('margin-bottom', '4px')
        .style('letter-spacing', '0.05em')
        .text('Clusters');

      legendTags.forEach(tag => {
        const item = div.append('div')
          .datum(tag)
          .attr('class', 'cl-item')
          .style('display', 'flex')
          .style('align-items', 'center')
          .style('gap', '6px')
          .style('padding', '3px 5px')
          .style('border-radius', '3px')
          .style('cursor', 'pointer')
          .style('background', 'transparent')
          .on('click', () => focusTag(tag));

        item.append('span')
          .style('display', 'inline-block')
          .style('width', '10px')
          .style('height', '10px')
          .style('border-radius', '50%')
          .style('border', `2px solid ${tagColor[tag]}`)
          .style('background', tagColor[tag] + '30')
          .style('flex-shrink', '0');

        item.append('span')
          .style('color', tagColor[tag])
          .text(tag);
      });
    }
  }

  function buildAgeLegend() {
    if (legendEl) { d3.select(legendEl).remove(); legendEl = null; }
    if (W < 415) return;

    const labels  = ['< 1mo', '1–3mo', '3–6mo', '6–12mo', '1–2yr', '2yr+'];
    const swatchW = 16, swatchH = 12, gap = 5;
    const legendW = 88;
    const legendH = 14 + labels.length * (swatchH + gap);

    const legend = d3.select(container).append('svg')
      .attr('width', legendW)
      .attr('height', legendH)
      .style('position', 'absolute')
      .style('bottom', '16px')
      .style('left', '16px')
      .style('pointer-events', 'none');
    legendEl = legend.node();

    legend.append('text')
      .text('Article age')
      .attr('x', 0).attr('y', 10)
      .attr('fill', '#888')
      .attr('font-size', '10px');

    labels.forEach((label, i) => {
      const c = d3.hsl(ARTICLE_COL);
      c.s = SAT_FACTORS[i];
      c.l = LIT_FACTORS[i];
      const y = 16 + i * (swatchH + gap);

      legend.append('rect')
        .attr('x', 0).attr('y', y)
        .attr('width', swatchW).attr('height', swatchH)
        .attr('rx', 2)
        .attr('fill', c.formatHex());

      legend.append('text')
        .text(label)
        .attr('x', swatchW + 5).attr('y', y + swatchH - 1)
        .attr('fill', '#888')
        .attr('font-size', '10px');
    });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Re-render when the container resizes (orientation change, window resize).
  // Debounced to avoid thrashing during continuous resize drags.
  let resizeTimer = null;
  new ResizeObserver(() => {
    if (!graphData) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      updateContainerHeight();
      readDimensions();
      activeTag = null;
      activeMemberIds = null;
      focusScale = null;
      runLabelOcclusion = null;
      zoom.translateExtent([[-VW, -VH], [2 * VW, 2 * VH]]);
      svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(INIT_ZOOM).translate(-VW / 2, -VH / 2));
      if (currentSim) { currentSim.stop(); currentSim = null; }
      g.selectAll('*').remove();
      render(graphData);
    }, 250);
  }).observe(container);
})();
</script>
